<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ChemMarks Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }

        /* Animated gradient background */
        .login-bg {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 25%, #1e1b4b 50%, #0f172a 100%);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating decorative orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 8s ease-in-out infinite;
        }
        .orb-1 { width: 400px; height: 400px; background: #6366f1; top: -100px; left: -100px; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: #818cf8; bottom: -50px; right: -50px; animation-delay: -3s; }
        .orb-3 { width: 250px; height: 250px; background: #a78bfa; top: 40%; right: 20%; animation-delay: -5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Card glass effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Input focus ring */
        .input-field:focus {
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        .shake { animation: shake 0.4s ease; }

        /* Fade in */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 0.6s ease forwards; }
        .fade-in-delay { animation: fadeInUp 0.6s ease 0.15s forwards; opacity: 0; }
        .fade-in-delay-2 { animation: fadeInUp 0.6s ease 0.3s forwards; opacity: 0; }

        /* Grid pattern overlay */
        .grid-pattern {
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
        }
    </style>
</head>
<body class="login-bg min-h-screen flex items-center justify-center relative overflow-hidden grid-pattern">

    <!-- Decorative orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Brand bar at top -->
    <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-indigo-500 via-purple-500 to-indigo-500"></div>

    <!-- Login Card -->
    <div class="glass-card rounded-2xl shadow-2xl w-full max-w-md mx-4 p-8 fade-in relative z-10">
        <!-- Logo & Title -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-indigo-600 text-white mb-4 shadow-lg shadow-indigo-200">
                <i class="fas fa-flask text-xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">ChemMarks Analytics</h1>
            <p class="text-slate-500 text-sm mt-1">A/L Chemistry Paper Marks Dashboard</p>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm flex items-center gap-2">
            <i class="fas fa-circle-exclamation"></i>
            <span id="errorText">Invalid username or password.</span>
        </div>

        <!-- Form -->
        <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
            <div class="space-y-4 fade-in-delay">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><i class="fas fa-user text-sm"></i></span>
                        <input type="text" id="username" placeholder="Enter your username"
                            class="input-field w-full pl-10 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 outline-none transition-all focus:border-indigo-500 bg-slate-50/50">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><i class="fas fa-lock text-sm"></i></span>
                        <input type="password" id="password" placeholder="Enter your password"
                            class="input-field w-full pl-10 pr-11 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-800 placeholder-slate-400 outline-none transition-all focus:border-indigo-500 bg-slate-50/50">
                        <button type="button" onclick="togglePassword()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors">
                            <i id="eyeIcon" class="fas fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl text-sm transition-all duration-200 shadow-lg shadow-indigo-200 hover:shadow-indigo-300 active:scale-[0.98] fade-in-delay-2">
                Sign In
            </button>
        </form>

        <!-- Role hints -->
        <div class="mt-6 pt-5 border-t border-slate-100 fade-in-delay-2">
            <p class="text-xs text-slate-400 text-center mb-3">Demo Credentials</p>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="fillCredentials('teacher','pass123')" class="text-xs bg-slate-50 hover:bg-indigo-50 text-slate-600 hover:text-indigo-700 py-2 px-2 rounded-lg transition-colors text-center font-medium">
                    <i class="fas fa-chalkboard-user block text-base mb-1 text-indigo-400"></i>Teacher
                </button>
                <button onclick="fillCredentials('staff1','pass123')" class="text-xs bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-700 py-2 px-2 rounded-lg transition-colors text-center font-medium">
                    <i class="fas fa-keyboard block text-base mb-1 text-emerald-400"></i>Staff
                </button>
                <button onclick="fillCredentials('student1','pass123')" class="text-xs bg-slate-50 hover:bg-amber-50 text-slate-600 hover:text-amber-700 py-2 px-2 rounded-lg transition-colors text-center font-medium">
                    <i class="fas fa-graduation-cap block text-base mb-1 text-amber-400"></i>Student
                </button>
            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pw.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // Fill credentials from demo buttons
        function fillCredentials(user, pass) {
            document.getElementById('username').value = user;
            document.getElementById('password').value = pass;
            document.getElementById('errorMsg').classList.add('hidden');
        }

        // Hardcoded user database
        const users = {
            teacher:  { password: 'pass123', role: 'teacher',  redirect: 'teacher-dashboard.html' },
            staff1:   { password: 'pass123', role: 'staff',    redirect: 'staff-dashboard.html' },
            student1: { password: 'pass123', role: 'student',  redirect: 'student-profile.html' }
        };

        // Handle login
        function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const card = errorDiv.closest('.glass-card');

            errorDiv.classList.add('hidden');

            if (!username || !password) {
                document.getElementById('errorText').textContent = 'Please enter both username and password.';
                errorDiv.classList.remove('hidden');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
                return;
            }

            const user = users[username];
            if (!user || user.password !== password) {
                document.getElementById('errorText').textContent = 'Invalid username or password. Try the demo credentials below.';
                errorDiv.classList.remove('hidden');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
                return;
            }

            // Success — show brief loading state then redirect
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Signing in...';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = user.redirect;
            }, 800);
        }
    </script>
</body>
</html>
