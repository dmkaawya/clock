<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Countdown Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: white;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .mode-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 25px;
            margin: 0 10px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .mode-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
        
        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        
        .timer-display {
            display: flex;
            justify-content: center;
            margin: 40px 0;
            flex-wrap: wrap;
        }
        
        .time-unit {
            margin: 0 15px;
            text-align: center;
        }
        
        .time-value {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
            margin-bottom: 10px;
            min-width: 120px;
        }
        
        .time-label {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        
        .controls {
            margin: 30px 0;
        }
        
        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .input-group label {
            margin-right: 15px;
            font-size: 1.2rem;
        }
        
        .input-group input, .input-group select {
            padding: 12px 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            margin-right: 15px;
            width: 150px;
        }
        
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
        
        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 75, 43, 0.6);
        }
        
        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-secondary {
            background: linear-gradient(45deg, #36d1dc, #5b86e5);
            box-shadow: 0 5px 15px rgba(91, 134, 229, 0.4);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 8px 20px rgba(91, 134, 229, 0.6);
        }
        
        .message {
            margin-top: 20px;
            font-size: 1.3rem;
            min-height: 30px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .study-timer {
            display: none;
        }
        
        .target-timer {
            display: block;
        }
        
        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #ff416c, #ff4b2b);
            width: 0%;
            border-radius: 5px;
            transition: width 1s linear;
        }
        
        @media (max-width: 768px) {
            .time-value {
                font-size: 3.5rem;
                min-width: 80px;
            }
            
            .time-unit {
                margin: 0 5px;
            }
            
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SUPER COUNTDOWN TIMER</h1>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="targetModeBtn">Target Timer</button>
            <button class="mode-btn" id="studyModeBtn">Study Timer</button>
        </div>
        
        <div class="target-timer" id="targetTimer">
            <div class="input-group">
                <label for="targetDate">Target Date:</label>
                <input type="date" id="targetDate" required>
                
                <label for="targetTime">Target Time:</label>
                <input type="time" id="targetTime" required>
            </div>
            
            <div class="controls">
                <button class="btn" id="startTargetBtn">Start Countdown</button>
                <button class="btn btn-secondary" id="resetTargetBtn">Reset</button>
            </div>
        </div>
        
        <div class="study-timer" id="studyTimer">
            <div class="input-group">
                <label for="studyMinutes">Study Time:</label>
                <input type="number" id="studyMinutes" min="1" max="180" value="25" placeholder="Minutes">
                
                <label for="studySeconds">Seconds:</label>
                <input type="number" id="studySeconds" min="0" max="59" value="0" placeholder="Seconds">
            </div>
            
            <div class="controls">
                <button class="btn" id="startStudyBtn">Start Study</button>
                <button class="btn btn-secondary" id="pauseStudyBtn">Pause</button>
                <button class="btn btn-secondary" id="resetStudyBtn">Reset</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress" id="studyProgress"></div>
            </div>
        </div>
        
        <div class="timer-display">
            <div class="time-unit">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-unit">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>
        
        <div class="message" id="message">Set a target date/time or study duration</div>
    </div>

    <script>
        // DOM Elements
        const targetModeBtn = document.getElementById('targetModeBtn');
        const studyModeBtn = document.getElementById('studyModeBtn');
        const targetTimer = document.getElementById('targetTimer');
        const studyTimer = document.getElementById('studyTimer');
        
        const targetDate = document.getElementById('targetDate');
        const targetTime = document.getElementById('targetTime');
        const startTargetBtn = document.getElementById('startTargetBtn');
        const resetTargetBtn = document.getElementById('resetTargetBtn');
        
        const studyMinutes = document.getElementById('studyMinutes');
        const studySeconds = document.getElementById('studySeconds');
        const startStudyBtn = document.getElementById('startStudyBtn');
        const pauseStudyBtn = document.getElementById('pauseStudyBtn');
        const resetStudyBtn = document.getElementById('resetStudyBtn');
        const studyProgress = document.getElementById('studyProgress');
        
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const messageEl = document.getElementById('message');
        
        // Timer variables
        let targetCountdown;
        let studyCountdown;
        let studyTotalSeconds = 0;
        let studyRemainingSeconds = 0;
        let isStudyPaused = false;
        
        // Mode switching
        targetModeBtn.addEventListener('click', () => {
            targetModeBtn.classList.add('active');
            studyModeBtn.classList.remove('active');
            targetTimer.style.display = 'block';
            studyTimer.style.display = 'none';
            resetAllTimers();
            messageEl.textContent = 'Set a target date/time to start countdown';
        });
        
        studyModeBtn.addEventListener('click', () => {
            studyModeBtn.classList.add('active');
            targetModeBtn.classList.remove('active');
            studyTimer.style.display = 'block';
            targetTimer.style.display = 'none';
            resetAllTimers();
            messageEl.textContent = 'Set study duration and start your session';
        });
        
        // Target Timer Functions
        startTargetBtn.addEventListener('click', startTargetCountdown);
        resetTargetBtn.addEventListener('click', resetTargetTimer);
        
        function startTargetCountdown() {
            const dateValue = targetDate.value;
            const timeValue = targetTime.value;
            
            if (!dateValue || !timeValue) {
                messageEl.textContent = 'Please select both date and time';
                return;
            }
            
            const targetDateTime = new Date(`${dateValue}T${timeValue}`);
            const now = new Date();
            
            if (targetDateTime <= now) {
                messageEl.textContent = 'Please select a future date and time';
                return;
            }
            
            resetAllTimers();
            messageEl.textContent = `Counting down to ${targetDateTime.toLocaleString()}`;
            
            targetCountdown = setInterval(() => {
                updateTargetCountdown(targetDateTime);
            }, 1000);
            
            updateTargetCountdown(targetDateTime);
        }
        
        function updateTargetCountdown(targetDateTime) {
            const now = new Date();
            const difference = targetDateTime - now;
            
            if (difference <= 0) {
                clearInterval(targetCountdown);
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
                messageEl.textContent = 'Time reached! 🎉';
                playNotificationSound();
                return;
            }
            
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            
            daysEl.textContent = days.toString().padStart(2, '0');
            hoursEl.textContent = hours.toString().padStart(2, '0');
            minutesEl.textContent = minutes.toString().padStart(2, '0');
            secondsEl.textContent = seconds.toString().padStart(2, '0');
        }
        
        function resetTargetTimer() {
            clearInterval(targetCountdown);
            daysEl.textContent = '00';
            hoursEl.textContent = '00';
            minutesEl.textContent = '00';
            secondsEl.textContent = '00';
            messageEl.textContent = 'Set a target date/time to start countdown';
        }
        
        // Study Timer Functions
        startStudyBtn.addEventListener('click', startStudyTimer);
        pauseStudyBtn.addEventListener('click', pauseStudyTimer);
        resetStudyBtn.addEventListener('click', resetStudyTimer);
        
        function startStudyTimer() {
            const minutes = parseInt(studyMinutes.value) || 0;
            const seconds = parseInt(studySeconds.value) || 0;
            
            if (minutes <= 0 && seconds <= 0) {
                messageEl.textContent = 'Please enter a valid study duration';
                return;
            }
            
            if (!isStudyPaused) {
                studyTotalSeconds = minutes * 60 + seconds;
                studyRemainingSeconds = studyTotalSeconds;
            }
            
            isStudyPaused = false;
            messageEl.textContent = 'Study session in progress... Focus!';
            
            studyCountdown = setInterval(() => {
                updateStudyTimer();
            }, 1000);
            
            updateStudyTimer();
        }
        
        function updateStudyTimer() {
            if (studyRemainingSeconds <= 0) {
                clearInterval(studyCountdown);
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
                messageEl.textContent = 'Study session completed! Great job! 🎓';
                playNotificationSound();
                studyProgress.style.width = '100%';
                return;
            }
            
            const hours = Math.floor(studyRemainingSeconds / 3600);
            const minutes = Math.floor((studyRemainingSeconds % 3600) / 60);
            const seconds = studyRemainingSeconds % 60;
            
            daysEl.textContent = '00';
            hoursEl.textContent = hours.toString().padStart(2, '0');
            minutesEl.textContent = minutes.toString().padStart(2, '0');
            secondsEl.textContent = seconds.toString().padStart(2, '0');
            
            // Update progress bar
            const progress = ((studyTotalSeconds - studyRemainingSeconds) / studyTotalSeconds) * 100;
            studyProgress.style.width = `${progress}%`;
            
            studyRemainingSeconds--;
        }
        
        function pauseStudyTimer() {
            if (studyCountdown) {
                clearInterval(studyCountdown);
                isStudyPaused = true;
                messageEl.textContent = 'Study session paused';
            }
        }
        
        function resetStudyTimer() {
            clearInterval(studyCountdown);
            studyRemainingSeconds = 0;
            isStudyPaused = false;
            daysEl.textContent = '00';
            hoursEl.textContent = '00';
            minutesEl.textContent = '00';
            secondsEl.textContent = '00';
            studyProgress.style.width = '0%';
            messageEl.textContent = 'Set study duration and start your session';
        }
        
        // Utility Functions
        function resetAllTimers() {
            clearInterval(targetCountdown);
            clearInterval(studyCountdown);
            studyRemainingSeconds = 0;
            isStudyPaused = false;
            daysEl.textContent = '00';
            hoursEl.textContent = '00';
            minutesEl.textContent = '00';
            secondsEl.textContent = '00';
            studyProgress.style.width = '0%';
        }
        
        function playNotificationSound() {
            // Create a simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sine';
            oscillator.frequency.value = 800;
            gainNode.gain.value = 0.3;
            
            oscillator.start();
            setTimeout(() => {
                oscillator.stop();
            }, 500);
        }
        
        // Initialize with today's date as default
        const today = new Date();
        targetDate.valueAsDate = today;
        
        // Set default time to current time + 1 hour
        const later = new Date();
        later.setHours(later.getHours() + 1);
        targetTime.value = later.toTimeString().slice(0, 5);
    </script>
</body>
</html>
